<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Very First Web</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="gallery.css">
    <style>
        /* --- Modal (Popup) Styles --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            /* Animation */
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {transform: scale(0.7); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
        }

        .gallery-item img {
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery-item img:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="social-links">
                <a href="https://www.facebook.com/rex.bolina.5" target="_blank"><i class="fab fa-facebook"></i> <span>Facebook</span></a>
                <a href="https://www.instagram.com/rex_snst?igsh=MXNiaDg5bHJ2cDk0Yg==" target="_blank"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
                <a href="https://github.com/Rexsnst" target="_blank"><i class="fab fa-github"></i> <span>Github</span></a>
            </div>
            <nav class="main-nav">
                <a href="https://rexgelstory.vercel.app/">My Story?</a>
                <a href="https://rexabout.vercel.app/">About</a>
                <a href="https://www.facebook.com/rex.bolina.5">Contact</a>
                <a href="https://rexgallery.vercel.app/">Gallery</a>
            </nav>
        </header>

        <main class="bento-grid">
            <div class="gallery-item"><img src="p1.jpg" alt="Gallery Photo"></div>
            <div class="gallery-item"><img src="p2.jpg" alt="Gallery Photo"></div>
            <div class="gallery-item"><img src="p199.jpg" alt="Gallery Photo"></div>
            <div class="gallery-item"><img src="p200.jpg" alt="Gallery Photo"></div>
        </main>
    </div>

    <div id="myModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="img01">
    </div>

    <script>
        // Get the modal
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("img01");
        const closeBtn = document.getElementsByClassName("close-btn")[0];

        // Select all images in the gallery
        const images = document.querySelectorAll(".gallery-item img");

        // Loop through images and add click event
        images.forEach(img => {
            img.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.src;
            }
        });

        // Close when clicking the 'X'
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        // Close when clicking anywhere outside the image
        modal.onclick = function(event) {
            if (event.target !== modalImg) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
